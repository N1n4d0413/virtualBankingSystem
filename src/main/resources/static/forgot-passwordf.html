<!DOCTYPE html>
<html lang="en">
<!--
HOOK INDEX (FORGOT PASSWORD FLOW)

[I0]  URL PARAMS — read username + role from URL
[I1]  THEME SETUP
[I2]  FETCH SECURITY QUESTION from backend
[I3]  STEP 1 — Display security question, collect answer
[I4]  STEP 2 — New password form + captcha modal
[I5]  CAPTCHA LOGIC — hold-to-verify (same as signupf)
[I6]  SUBMIT ANSWER  → POST /forgot-password/verify
[I7]  RESET PASSWORD → POST /forgot-password/reset
[I8]  NAV LINKS — back to login
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS - Forgot Password</title>
  <script src="theme.js"></script>

  <style>

    /* ================= LIGHT MODE (GREY / SLATE) ================= */
    :root {
        --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e5e7eb 45%, #f8fafc 100%);
        --card-bg: #ffffff;
        --header-gradient: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        --header-subtitle: rgba(255, 255, 255, 0.9);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border-color: #d1d5db;
        --border-soft: #cbd5e1;
        --btn-primary: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        --btn-secondary-bg: #e5e7eb;
        --btn-secondary-text: #0f172a;
        --muted-bg: #f1f5f9;
        --btn-glow: rgba(30, 41, 59, 0.35);
        --verify-green: #22c55e;
    }

    /* ================= DARK MODE ================= */
    body.dark {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        --card-bg: #0b1220;
        --header-gradient: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
        --header-subtitle: rgba(255, 255, 255, 0.85);
        --text-primary: #e5e7eb;
        --text-secondary: #9ca3af;
        --border-color: #1f2937;
        --border-soft: #334155;
        --btn-primary: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        --btn-secondary-bg: #1f2937;
        --btn-secondary-text: #e5e7eb;
        --muted-bg: #0f172a;
        --btn-glow: rgba(99, 102, 241, 0.55);
        --verify-green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-y: auto;
    }

    /* ================= CONTAINER ================= */
    .container {
        width: 95%;
        max-width: 480px;
        background: var(--card-bg);
        border-radius: 32px;
        box-shadow: 0 22px 55px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        position: relative;
        margin: auto;
    }

    /* ================= THEME TOGGLE ================= */
    .theme-toggle {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.18);
        border: none;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 18px;
        cursor: pointer;
        color: #fff;
        transition: background 0.2s ease;
    }

    .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.28);
    }

    /* ================= HEADER ================= */
    .header {
        background: var(--header-gradient);
        padding: 30px;
        text-align: center;
        color: white;
    }

    .header h1 {
        font-size: 28px;
        margin-bottom: 6px;
    }

    .header p {
        font-size: 14px;
        color: var(--header-subtitle);
    }

    /* ================= CONTENT ================= */
    .content {
        padding: 30px 28px 32px;
    }

    /* ================= STEP INDICATOR ================= */
    .step-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 28px;
    }

    .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--border-soft);
        transition: background 0.3s;
    }

    .step-dot.active {
        background: var(--btn-primary);
        background: #4f46e5;
        width: 28px;
        border-radius: 5px;
    }

    .step-dot.done {
        background: #22c55e;
    }

    /* ================= STEP PANELS ================= */
    .step {
        display: none;
    }

    .step.active {
        display: block;
    }

    .step-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 6px;
        text-align: center;
    }

    .step-subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 24px;
        text-align: center;
        line-height: 1.5;
    }

    /* ================= SECURITY QUESTION BOX ================= */
    .question-box {
        background: var(--muted-bg);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 16px 18px;
        margin-bottom: 20px;
    }

    .question-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 6px;
    }

    .question-text {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
    }

    /* ================= FORM GROUP ================= */
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
    }

    label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
    }

    input {
        width: 100%;
        padding: 13px 15px;
        border-radius: 10px;
        border: 2px solid var(--border-soft);
        background: var(--card-bg);
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.3s;
    }

    input::placeholder {
        color: var(--text-secondary);
    }

    input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    /* ================= BUTTONS ================= */
    .btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        margin-top: 6px;
    }

    .btn-primary {
        background: var(--btn-primary);
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px var(--btn-glow);
    }

    /* ================= MESSAGES ================= */
    .message {
        padding: 12px 15px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
    }

    .message.show { display: block; }

    .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    body.dark .message.success {
        background: rgba(34, 197, 94, 0.15);
        color: #bbf7d0;
        border: 1px solid rgba(34, 197, 94, 0.35);
    }

    body.dark .message.error {
        background: rgba(239, 68, 68, 0.15);
        color: #fecaca;
        border: 1px solid rgba(239, 68, 68, 0.35);
    }

    /* ================= LOADING STATE ================= */
    .loading-box {
        text-align: center;
        padding: 30px 20px;
        color: var(--text-secondary);
        font-size: 14px;
    }

    /* ================= BACK LINK ================= */
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        font-weight: 600;
        color: #2563eb;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.75; }

    body.dark .back-link { color: #93c5fd; }

    /* ================= CAPTCHA MODAL ================= */
    .captcha-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        backdrop-filter: blur(3px);
    }

    .captcha-modal.hidden { display: none; }

    .captcha-card {
        width: 90%;
        max-width: 360px;
        padding: 28px;
        text-align: center;
        background: var(--card-bg);
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
    }

    .captcha-card h3 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 16px;
    }

    /* Hold box */
    #holdBox {
        position: relative;
        height: 46px;
        border-radius: 14px;
        border: 2px dashed var(--border-soft);
        overflow: hidden;
        cursor: pointer;
        margin-top: 14px;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
    }

    #holdFill {
        position: absolute;
        inset: 0;
        width: 0%;
        background: linear-gradient(135deg, var(--verify-green), #15803d);
    }

    #holdText {
        position: relative;
        z-index: 2;
        line-height: 46px;
        font-weight: 600;
        color: var(--text-secondary);
        user-select: none;
        -webkit-user-select: none;
    }

    #holdBox.verified #holdText { color: #fff; }

    .captcha-card .btn-cancel-captcha {
        margin-top: 16px;
        padding: 10px 16px;
        border-radius: 10px;
        border: 2px solid var(--border-soft);
        background: transparent;
        color: var(--text-primary);
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s ease;
        font-family: inherit;
        font-size: 14px;
    }

    .captcha-card .btn-cancel-captcha:hover {
        background: rgba(0, 0, 0, 0.04);
    }

    body.dark .captcha-card .btn-cancel-captcha:hover {
        background: rgba(255, 255, 255, 0.08);
    }

  </style>
</head>

<body>

<div class="container">
  <button class="theme-toggle" id="themeToggle">🌙</button>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1>VBS</h1>
    <p>Account Recovery</p>
  </div>

  <div class="content">

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
    </div>

    <div id="pageMessage" class="message"></div>

    <!-- ===== STEP 1: SECURITY QUESTION ===== -->
    <div class="step active" id="step1">
      <div id="loadingBox" class="loading-box">⏳ Fetching security question...</div>

      <div id="questionSection" style="display:none">
        <div class="step-title">Security Check</div>
        <div class="step-subtitle">Answer your security question to continue</div>

        <div class="question-box">
          <div class="question-label">Your Security Question</div>
          <div class="question-text" id="questionText">—</div>
        </div>

        <div class="form-group">
          <label for="answerInput">Your Answer</label>
          <input id="answerInput" type="text" placeholder="Type your answer..." autocomplete="off">
        </div>

        <button class="btn btn-primary" id="verifyAnswerBtn" onclick="submitAnswer()">
          Verify Answer →
        </button>
      </div>
    </div>

    <!-- ===== STEP 2: NEW PASSWORD ===== -->
    <div class="step" id="step2">
      <div class="step-title">Reset Password</div>
      <div class="step-subtitle">Choose a strong new password for your account</div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Re-enter new password">
      </div>

      <button class="btn btn-primary" id="resetBtn" onclick="initiateReset()">
        Reset Password
      </button>
    </div>

    <a class="back-link" id="backLink">← Back to Login</a>

  </div>
</div>

<!-- ================= CAPTCHA MODAL ================= -->
<div id="captchaModal" class="captcha-modal hidden">
  <div class="captcha-card">
    <h3>Confirm Reset</h3>
    <div id="holdBox">
      <div id="holdFill"></div>
      <span id="holdText">Hold to confirm</span>
    </div>
    <button class="btn-cancel-captcha" onclick="closeCaptcha()">Cancel</button>
  </div>
</div>

<script>

  /* =====================================================
     [I0] URL PARAMS
  ===================================================== */
  const params   = new URLSearchParams(location.search);
  const username = params.get('username') || '';
  const role     = params.get('role') || localStorage.getItem('role') || 'customer';
  const normalizedRole = (role || '').toLowerCase() === 'admin' ? 'admin' : 'customer';
    const loginRedirect = `/loginf.html?role=${normalizedRole}`;

  if (!username) location.href = loginRedirect;

  /* =====================================================
     [I1] THEME
  ===================================================== */
  const themeToggle = document.getElementById('themeToggle');

  function applyTheme() {
      const isDark = localStorage.getItem('theme') === 'dark';
      document.body.classList.toggle('dark', isDark);
      themeToggle.textContent = isDark ? '☀️' : '🌙';
  }

  applyTheme();

  themeToggle.onclick = () => {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
  };

  /* =====================================================
     [I8] NAV
  ===================================================== */
  document.getElementById('backLink').onclick = () => {
      location.href = loginRedirect;
  };

  /* =====================================================
     [I2] FETCH SECURITY QUESTION
  ===================================================== */
  const isAdmin = normalizedRole === 'admin';
  const fpBase = isAdmin ? '/admin/forgot-password' : '/forgot-password';
  const questionPath = `${fpBase}/question`;

  // Single backend (no mixed ports).
  const API_URL = 'http://localhost:8082';

  async function apiFetch(relativePath, options = {}) {
      return await fetch(`${API_URL}${relativePath}`, options);
  }

  async function fetchSecurityQuestion() {
      try {
          const res = await apiFetch(`${questionPath}?username=${encodeURIComponent(username)}`);
          let data = null;
          try {
              data = await res.json();
          } catch {
              data = null;
          }

          if (!res.ok) {
              if (res.status === 404) {
                  throw new Error((data && data.message) ? String(data.message) : 'User Not found');
              }
              if (res.status === 403) {
                  throw new Error((data && data.message) ? String(data.message) : 'User account status is Not Active');
              }
              throw new Error((data && data.message) ? String(data.message) : 'Unable to load security question');
          }

          const question = (data?.secQuestion ?? '').toString().trim();
          if (!question) {
              throw new Error('Security question not available');
          }

          document.getElementById('questionText').textContent = question;
          document.getElementById('loadingBox').style.display   = 'none';
          document.getElementById('questionSection').style.display = 'block';

      } catch (err) {
          document.getElementById('loadingBox').innerHTML =
              `❌ Could not load security question. <br><small>${err.message}</small>`;
          showMessage('pageMessage', err.message || 'Failed to fetch security question.', 'error');
      }
  }

  /* =====================================================
     [I3] STEP 1 — SUBMIT ANSWER
  ===================================================== */
  async function submitAnswer() {
      const answer = document.getElementById('answerInput').value.trim().toLowerCase();

      if (!answer) {
          showMessage('pageMessage', 'Please enter your answer.', 'error');
          return;
      }

      try {
          const res = await apiFetch(`${fpBase}/verify`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, answer })
          });

          let message = '';
          try {
              const data = await res.json();
              message = (data && typeof data === 'object' && 'message' in data) ? String(data.message) : JSON.stringify(data);
          } catch {
              message = await res.text();
          }

          if (res.ok) {
              goToStep2();
          } else {
              showMessage('pageMessage', message || 'Incorrect answer. Try again.', 'error');
          }

      } catch (err) {
          showMessage('pageMessage', 'Server error. Please try again.', 'error');
      }
  }

  /* Allow Enter key on answer input */
  document.getElementById('answerInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') submitAnswer();
  });

  /* =====================================================
     STEP NAVIGATION
  ===================================================== */
  function goToStep2() {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');

      document.getElementById('dot1').classList.remove('active');
      document.getElementById('dot1').classList.add('done');
      document.getElementById('dot2').classList.add('active');

      clearMessage('pageMessage');
  }

  /* =====================================================
     [I4] STEP 2 — INITIATE RESET (opens captcha)
  ===================================================== */
  function initiateReset() {
      const newPw  = document.getElementById('newPassword').value;
      const confPw = document.getElementById('confirmPassword').value;

      if (!newPw || !confPw) {
          showMessage('pageMessage', 'Please fill in both password fields.', 'error');
          return;
      }

      if (newPw !== confPw) {
          showMessage('pageMessage', 'Passwords do not match.', 'error');
          return;
      }

      if (newPw.length < 6) {
          showMessage('pageMessage', 'Password must be at least 6 characters.', 'error');
          return;
      }

      openCaptcha();
  }

  /* =====================================================
     [I5] CAPTCHA LOGIC
  ===================================================== */
  const HOLD_TIME  = 2500;
  const MAX_FAILS  = 1;
  const LOCK_MS    = 10000;

  let verified    = false;
  let isHolding   = false;
  let progress    = 0;
  let timer       = null;
  let uiTick      = null;
  let holdStartTime = 0;

  let fails       = Number(localStorage.getItem('captchaFailCount'))    || 0;
  let lockedUntil = Number(localStorage.getItem('captchaLockedUntil'))  || 0;

  const holdBox  = document.getElementById('holdBox');
  const holdFill = document.getElementById('holdFill');
  const holdText = document.getElementById('holdText');

  function isLocked() { return Date.now() < lockedUntil; }

  function attemptsLeft() { return Math.max(1, MAX_FAILS - fails); }

  function updateCaptchaText() {
      if (verified) return;
      if (isHolding) { holdText.innerText = 'Verifying...'; return; }
      if (isLocked()) {
          const sec = Math.ceil((lockedUntil - Date.now()) / 1000);
          holdText.innerText = `Locked (${sec}s)`;
      } else {
          const a = attemptsLeft();
          holdText.innerText = `Hold to confirm (${a} attempt${a > 1 ? 's' : ''})`;
      }
  }

  function resetVerification() {
      verified  = false;
      isHolding = false;
      progress  = 0;
      clearInterval(timer);
      holdFill.style.width = '0%';
      holdBox.classList.remove('verified');
      updateCaptchaText();
  }

  function openCaptcha() {
      resetVerification();
      document.getElementById('captchaModal').classList.remove('hidden');
      updateCaptchaText();
      uiTick = setInterval(updateCaptchaText, 500);
  }

  function closeCaptcha() {
      document.getElementById('captchaModal').classList.add('hidden');
      clearInterval(uiTick);
      uiTick = null;
  }

  function startHold() {
      if (verified || isLocked() || isHolding) return;

      isHolding     = true;
      progress      = 0;
      holdStartTime = Date.now();

      timer = setInterval(() => {
          const elapsed   = Date.now() - holdStartTime;
          const remaining = Math.max(0, HOLD_TIME - elapsed);

          progress = (elapsed / HOLD_TIME) * 100;
          holdFill.style.width = `${Math.min(progress, 100)}%`;
          holdText.innerText   = `Hold to confirm (${(remaining / 1000).toFixed(1)}s)`;

          if (elapsed >= HOLD_TIME) {
              clearInterval(timer);
              isHolding = false;
              verified  = true;

              holdFill.style.width = '100%';
              holdBox.classList.add('verified');
              holdText.innerText = '✔ Confirmed';

              fails = 0;
              localStorage.removeItem('captchaFailCount');
              localStorage.removeItem('captchaLockedUntil');

              setTimeout(() => {
                  closeCaptcha();
                  performReset();
              }, 300);
          }
      }, 50);
  }

  function cancelHold() {
      if (!isHolding || verified) return;

      isHolding = false;
      clearInterval(timer);

      fails++;
      lockedUntil = Date.now() + LOCK_MS;
      localStorage.setItem('captchaFailCount', fails);
      localStorage.setItem('captchaLockedUntil', lockedUntil);

      resetVerification();
  }

  holdBox.onmousedown  = startHold;
  holdBox.onmouseup    = cancelHold;
  holdBox.onmouseleave = cancelHold;
  holdBox.ontouchstart = e => { e.preventDefault(); startHold(); };
  holdBox.ontouchend   = e => { e.preventDefault(); cancelHold(); };

  /* =====================================================
     [I7] RESET PASSWORD → backend
  ===================================================== */
  async function performReset() {
      const newPassword = document.getElementById('newPassword').value;

      try {
          const res = await apiFetch(`${fpBase}/reset`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password: newPassword })
          });

          let message = '';
          try {
              const data = await res.json();
              message = (data && typeof data === 'object' && 'message' in data) ? String(data.message) : JSON.stringify(data);
          } catch {
              message = await res.text();
          }

          if (res.ok) {
              showMessage('pageMessage', '✅ Password reset successfully! Redirecting to login...', 'success');
              setTimeout(() => {
                  location.href = loginRedirect;
              }, 2000);
          } else {
              showMessage('pageMessage', message || 'Failed to reset password.', 'error');
              resetVerification();
          }

      } catch (err) {
          showMessage('pageMessage', 'Server error. Please try again.', 'error');
          resetVerification();
      }
  }

  /* =====================================================
     UTILS
  ===================================================== */
  function showMessage(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent  = msg;
      el.className    = `message ${type} show`;
  }

  function clearMessage(id) {
      const el = document.getElementById(id);
      el.className = 'message';
      el.textContent = '';
  }

  /* =====================================================
     BOOTSTRAP
  ===================================================== */
  window.addEventListener('DOMContentLoaded', fetchSecurityQuestion);

</script>
</body>
</html>
