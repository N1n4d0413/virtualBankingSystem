<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Virtual Banking System</title>
  <script src="theme.js"></script>
  <style>
    /* ================= LIGHT MODE (GREY / SLATE) ================= */
    :root {
        --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e5e7eb 45%, #f8fafc 100%);
        --card-bg: #ffffff;
        --muted-bg: #f1f5f9;
        --border-soft: #cbd5e1;
        --header-gradient: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        --header-subtitle: rgba(255, 255, 255, 0.9);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border-color: #d1d5db;
        --btn-primary: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        --btn-secondary-bg: #e5e7eb;
        --btn-secondary-text: #0f172a;
        --table-row-bg: #ffffff;
        --table-row-hover: #f8fafc;
        --id-color: #4f46e5;
        --date-color: #64748b;
    }

    /* ================= DARK MODE ================= */
    body.dark {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        --card-bg: #0b1220;
        --muted-bg: #0f172a;
        --border-soft: #334155;
        --header-gradient: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
        --header-subtitle: rgba(255, 255, 255, 0.85);
        --text-primary: #e5e7eb;
        --text-secondary: #9ca3af;
        --border-color: #1f2937;
        --btn-primary: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        --btn-secondary-bg: #1f2937;
        --btn-secondary-text: #e5e7eb;
        --table-row-bg: #0d1829;
        --table-row-hover: #111827;
        --id-color: #818cf8;
        --date-color: #94a3b8;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-gradient);
        min-height: 100vh;
        padding: 20px;
        transition: background 0.3s;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        background: var(--card-bg);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
        background: var(--header-gradient);
        padding: 30px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    .header h1 {
        font-size: 28px;
        font-weight: 600;
    }

    .btn-header {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .btn-header:hover {
        background: white;
        color: var(--text-primary);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .content {
        padding: 40px 30px;
    }

    .table-wrapper {
        overflow-x: auto;
        border-radius: 12px;
        background: var(--muted-bg);
        padding: 20px;
    }

    .history-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--table-row-bg);
        border-radius: 10px;
        overflow: hidden;
    }

    .history-table thead {
        background: var(--header-gradient);
        color: white;
    }

    .history-table th {
        padding: 16px 15px;
        text-align: left;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
    }

    .history-table tbody tr {
        border-bottom: 1px solid var(--border-color);
        transition: all 0.2s ease;
    }

    .history-table tbody tr:hover {
        background: var(--table-row-hover);
    }

    .history-table td {
        padding: 14px 15px;
        font-size: 14px;
        color: var(--text-primary);
    }

    .history-table td:first-child {
        font-weight: 600;
        color: var(--id-color);
        width: 60px;
    }

    .history-table td:nth-child(2) {
        color: var(--text-primary);
        word-break: break-word;
    }

    .date {
        color: var(--date-color);
        font-size: 12px;
        white-space: nowrap;
    }

    .history-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
        font-size: 16px;
    }

    .history-empty::before {
        content: '📋';
        display: block;
        font-size: 48px;
        margin-bottom: 15px;
        opacity: 0.7;
    }

    /* ================= THEME TOGGLE (if needed) ================= */
    .theme-toggle {
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 8px;
        color: white;
        font-size: 16px;
        padding: 8px 12px;
        cursor: pointer;
        transition: all 0.3s;
        margin-right: 10px;
    }

    .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.25);
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
        }

        .history-table th,
        .history-table td {
            padding: 10px;
            font-size: 12px;
        }

        .content {
            padding: 20px 15px;
        }

        .table-wrapper {
            padding: 10px;
        }

        .header-right {
            width: 100%;
            justify-content: center;
        }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Admin History</h1>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggleBtn">🌙</button>
      <button class="btn-header" id="backBtn">← Back</button>
    </div>
  </div>
  <div class="content">
    <div class="table-wrapper">
      <table class="history-table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Description</th>
          <th>Date</th>
        </tr>
        </thead>
        <tbody id="historyBody">
        <tr>
          <td colspan="3" class="history-empty">Loading history...</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8082';
  let userId = null;

  function getUserIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      const urlUserId = params.get('id');
      const storedUserId = localStorage.getItem('userId');
      userId = storedUserId || urlUserId;
  }

  function goBackToAdmin() {
      const params = new URLSearchParams();
      if (userId) params.set('id', userId);
      params.set('role', 'admin');
      window.location.href = `/admin.html?${params.toString()}`;
  }

  async function loadHistories() {
      try {
          const res = await fetch(`${API_URL}/histories`);
          if (!res.ok) throw new Error('Failed to load histories');
          const histories = await res.json();
          renderHistories(histories);
      } catch (err) {
          console.error(err);
          const body = document.getElementById('historyBody');
          body.innerHTML = `<tr><td colspan="3" class="history-empty">Unable to load history. Ensure backend is running.</td></tr>`;
      }
  }

  function renderHistories(list) {
      const body = document.getElementById('historyBody');
      if (!list || list.length === 0) {
          body.innerHTML = `<tr><td colspan="3" class="history-empty">No history records found.</td></tr>`;
          return;
      }

      body.innerHTML = list.map(h => `
          <tr>
              <td>#${h.id}</td>
              <td>${escapeHtml(h.description)}</td>
              <td class="date">${formatDate(h.date)}</td>
          </tr>
      `).join('');
  }

  function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleString();
  }

  function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(c) {
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];
      });
  }

  // Initialize event listeners
  function initEventListeners() {
      const backBtn = document.getElementById('backBtn');
      if (backBtn) {
          backBtn.addEventListener('click', function(e) {
              e.preventDefault();
              goBackToAdmin();
          });
      }
  }

  window.addEventListener('DOMContentLoaded', () => {
      getUserIdFromURL();
      loadHistories();
      initEventListeners();
  });
</script>
</body>
</html>
