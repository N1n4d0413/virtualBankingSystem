<!DOCTYPE html>
<html lang="en">
<!---
* HOOK INDEX (HOME)
* [H1] ROLE_REDIRECT_LOGIN
* [H2] ROLE_REDIRECT_SIGNUP
*
* Note:
* - Home has NO captcha
* - Role is passed via URL only
--->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Banking System - Home</title>
    <script src="theme.js"></script>

    <style>

        /* ================= LIGHT MODE (GREY / SLATE) ================= */
:root {
    --bg-gradient: linear-gradient(
        135deg,
        #f1f5f9 0%,
        #e5e7eb 45%,
        #f8fafc 100%
    );

    --card-bg: #ffffff;

    --header-gradient: linear-gradient(
        135deg,
        #334155 0%,
        #1e293b 100%
    );

    --header-subtitle: rgba(255, 255, 255, 0.9);

    --text-primary: #0f172a;   /* slate-900 */
    --text-secondary: #475569; /* slate-600 */

    --border-color: #d1d5db;

    --btn-primary: linear-gradient(
        135deg,
        #334155 0%,
        #1e293b 100%
    );

    --btn-secondary-bg: #e5e7eb;
    --btn-secondary-text: #0f172a;

    --feature-bg: #f1f5f9;

    --btn-glow: rgba(30, 41, 59, 0.35);
}


 /* ================= DARK MODE (DEFAULT) ================= */
body.dark {
    --bg-gradient: linear-gradient(
        135deg,
        #0f172a 0%,
        #020617 100%
    );

    --card-bg: #0b1220;

    --header-gradient: linear-gradient(
        135deg,
        #1e3a8a 0%,
        #312e81 100%
    );

    --header-subtitle: rgba(255, 255, 255, 0.85);

    --text-primary: #e5e7eb;
    --text-secondary: #9ca3af;

    --border-color: #1f2937;

    --btn-primary: linear-gradient(
        135deg,
        #2563eb 0%,
        #4f46e5 100%
    );

    --btn-secondary-bg: #1f2937;
    --btn-secondary-text: #e5e7eb;

    --feature-bg: #0f172a;

    --btn-glow: rgba(99, 102, 241, 0.55);
}


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 720px;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .theme-toggle {
            position: absolute;
            top: 18px;
            right: 18px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .header {
            background: var(--header-gradient);
            padding: 34px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 30px;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: var(--header-subtitle); /* FIX APPLIED */
        }

        .content {
            padding: 36px 40px 38px;
            text-align: center;
        }

        h2 {
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin: 26px 0;
            display: flex;
            justify-content: center;
        }

        select {
            width: 260px;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            text-align-last: center;
        }

        select option {
            text-align: center;
        }

        .features {
            display: flex;
            gap: 20px;
            margin: 28px 0 14px;
        }

        .feature {
            flex: 1;
            background: var(--feature-bg);
            border-radius: 18px;
            padding: 20px 16px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 36px rgba(30,41,59,0.25);
        }

        .feature span {
            font-size: 28px;
            display: block;
            margin-bottom: 10px;
        }

        .feature h4 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .feature p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px var(--btn-glow);
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }
    </style>
</head>

<body>

<div class="container">
    <button class="theme-toggle" id="themeToggleBtn" >🌙</button>

    <div class="header">
        <h1>VBS</h1>
        <p>Virtual Banking System</p>
    </div>

    <div class="content">
        <h2>Welcome to VBS</h2>
        <p>A virtual banking system designed to simulate real-world financial workflows.</p>

        <div class="form-group">
            <select id="roleSelect">
                <option value="">-- Select Role --</option>
                <option value="customer">Customer</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="features">
            <div class="feature">
                <span>💳</span>
                <h4>Transactions</h4>
                <p>Deposit, withdraw & transfer</p>
            </div>
            <div class="feature">
                <span>🔐</span>
                <h4>Role Access</h4>
                <p>Admin & customer separation</p>
            </div>
            <div class="feature">
                <span>📊</span>
                <h4>Account View</h4>
                <p>Balance & activity</p>
            </div>
            <div class="feature">
                <span>🛠️</span>
                <h4>Admin Tools</h4>
                <p>User & system controls</p>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="goToLoginV2()">Login</button>
            <button class="btn btn-secondary" onclick="goToSignupV2()">Sign Up</button>
        </div>
    </div>
</div>

<script>


    /* ---------- ROLE-BASED ROUTING ---------- */

    function getSelectedRole() {
        const role = document.getElementById("roleSelect").value;
        if (!role) {
            alert("Please select a role first");
            return null;
        }
        return role;
    }

    function goToLoginV2() {
    const role = getSelectedRole();
    if (!role) return;
    window.location.href = `/loginf.html?role=${role}`;   // [H1] ROLE_REDIRECT_LOGIN
}

    function goToSignupV2() {
    const role = getSelectedRole();
    if (!role) return;
    window.location.href = `/signupf.html?role=${role}`;  // [H2] ROLE_REDIRECT_SIGNUP
}


</script>

</body>
</html>
